<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" name="viewport"/>
  <title>Lygron - Defining Digital Identity</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    /* Base Styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; width: 100%; scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      background: radial-gradient(circle at 20% 30%, rgba(0, 100, 255, 0.25) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.3) 0%, transparent 45%),
                  linear-gradient(135deg, #0a0a0a 0%, #0a1a2a 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Header */
    #header-custom {
      position: fixed; top: 0; width: 100%; padding: 20px; z-index: 1000;
      transition: 0.4s ease;
    }
    #header-custom.scrolled {
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
    }
    .header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
    .header-inner h1 a { color: #fff; text-decoration: none; font-weight: 700; }

    .nav-menu a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 14px; opacity: 0.8; }
    .nav-menu a:hover { opacity: 1; }

    /* Hero Section */
    .hero-section {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 0 20px; text-align: center; flex-direction: column;
    }
    .hero-badge { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; margin-bottom: 20px; }
    .hero-section h2 { font-size: 60px; font-weight: 800; line-height: 1.1; }
    .hero-section h2 span { -webkit-text-stroke: 1px #fff; color: transparent; }
    
    .hero-buttons { margin-top: 30px; display: flex; gap: 15px; }
    .btn-primary { background: rgba(255,255,255,0.1); border: 1px solid #fff; padding: 12px 25px; border-radius: 30px; color: #fff; text-decoration: none; }

    /* Video Container */
    .hero-video { margin-top: 50px; width: 100%; max-width: 800px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,100,255,0.3); }

    /* Stats */
    .stats-section { padding: 80px 20px; display: flex; justify-content: center; gap: 50px; background: rgba(0,0,0,0.2); }
    .stat-item { text-align: center; }
    .stat-number { font-size: 40px; font-weight: 800; font-family: 'Space Mono'; }

    /* Loader */
    .loading { position: fixed; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .loading.hide { opacity: 0; visibility: hidden; transition: 0.5s; }
    .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #00aaff; border-radius: 50%; animation: spin 1s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .hero-section h2 { font-size: 40px; }
      .nav-menu { display: none; }
    }
  </style>
</head>
<body>

  <div class="loading" id="loading"><div class="loader"></div></div>

  <header id="header-custom">
    <div class="header-inner">
      <h1><a href="#">LYGRON</a></h1>
      <nav class="nav-menu">
        <a href="#">Home</a>
        <a href="#">Apps</a>
        <a href="#">Software</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero-section">
    <div class="hero-badge">Hello There</div>
    <h2>Defining <span>Digital Identity</span></h2>
    <p>Transforming Ideas into High-Performance Digital Assets.</p>
    
    <div class="hero-buttons">
      <a href="#" class="btn-primary">Custom Solutions</a>
      <a href="#" style="color: #fff; text-decoration: none;">Explore services →</a>
    </div>

    <div class="hero-video">
      <video autoplay loop muted playsinline style="width:100%;">
        <source src="https://files.catbox.moe/yzuaxl.webm" type="video/webm">
      </video>
    </div>
  </section>

  <section class="stats-section">
    <div class="stat-item">
      <div class="stat-number">15+</div>
      <div class="stat-label">Projects Completed</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">24/7</div>
      <div class="stat-label">Support</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">36</div>
      <div class="stat-label">Happy Clients</div>
    </div>
  </section>

  <script>
    window.addEventListener('load', function() {
      document.getElementById('loading').classList.add('hide');
    });

    window.addEventListener('scroll', function() {
      var header = document.getElementById('header-custom');
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
